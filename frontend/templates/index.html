<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎤 Lyricize</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
 
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <img src="/static/cactus-removebg-preview.png" alt="cactus">
  </div>
 
  <main>
 
    <!-- ── UPLOAD SCREEN ── -->
    <section id="upload-screen" class="screen active">
      <h1>LYRICIZE</span></h1>
      <p class="subtitle">Upload your track & lyrics — then sing from memory</p>
 
      <div class="card">
        <label class="file-drop" id="audio-drop">
          <span class="drop-icon">🎵</span>
          <span id="audio-label">Drop MP3 here or click to browse</span>
          <input type="file" id="audio-input" accept=".mp3,.wav,.ogg,.m4a" hidden/>
        </label>
 
        <textarea
          id="lyrics-input"
          placeholder="Paste your lyrics here — one line per row..."
          rows="8"
        ></textarea>
 
        <button id="start-btn" disabled>LET'S GO →</button>
      </div>

      <div class="preset-divider"><span>or pick a song</span></div>

      <div id="preset-list" class="preset-list"></div>

    </section>
 
    <!-- ── KARAOKE SCREEN ── -->
    <section id="karaoke-screen" class="screen">
 
      <div class="top-bar">
        <button id="back-btn" class="ghost-btn">← Back</button>
        <div id="line-counter" class="line-counter">Line 1 of —</div>
      </div>
 
      <div class="stage">
        <div id="stage-label" class="stage-label">Tap to sing</div>
 
        <div id="mic-ring" class="mic-ring idle">
          <div class="mic-icon">🎤</div>
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="54"/>
            <circle id="ring-progress" class="ring-fill" cx="60" cy="60" r="54"/>
          </svg>
        </div>
 
        <button id="listen-btn" class="listen-btn">TAP TO SING</button>
      </div>
 
      <div id="feedback-box" class="feedback hidden"></div>
 
      <div class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
 
    </section>
 
  </main>
 
  <script src="/static/js/app.js"></script>
</body>
</html>
